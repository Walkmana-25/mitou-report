name: Build PDF

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-push-pdf:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: typst-community/setup-typst@v4
        with:
          typst-version: 0.14.0
      - name: Build PDF
        run: make
      - name: Commit PDF
        run: |
          if git diff --quiet -- build/private_detailed_report.pdf; then
            echo "No PDF changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build/private_detailed_report.pdf
          git commit -m "chore: update generated pdf [skip ci]"
          git push

  build-pdf-for-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v4
        with:
          typst-version: 0.14.0
      - name: Build PDF
        run: make
      - name: Upload PDF artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: private-detailed-report-pdf
          path: build/private_detailed_report.pdf
      - name: Comment artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const artifactId = '${{ steps.upload.outputs.artifact-id }}';
            const url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${artifactId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `PDFをビルドしました。こちらから確認できます: ${url}`,
            });
